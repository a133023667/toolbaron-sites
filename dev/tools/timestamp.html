<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unix Timestamp Converter — Epoch to Human Date</title>
<meta name="description" content="Free Unix timestamp converter. Convert epoch time to human-readable date and vice versa. Instant, no upload.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav><a href="/" class="logo">Tool<span>Baron</span></a><div class="nav-links"><a href="/blog/">Blog</a><a href="/about.html">About</a></div></nav>
<div class="tool-container">
  <div class="tool-header"><h1>🕐 Unix Timestamp Converter</h1><p>Convert between epoch time and human-readable dates</p></div>
  <div class="ad-unit">AdSense — Below Title</div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px">
    <div style="margin-bottom:16px">
      <label style="font-weight:600;font-size:14px">Unix Timestamp (seconds):</label>
      <input type="number" id="ts" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:16px;margin-top:4px" placeholder="e.g. 1700000000">
    </div>
    <button class="btn btn-primary" onclick="tsToDate()">→ Convert to Date</button>
    <div style="margin-top:12px;font-size:15px;color:var(--muted)" id="tsResult"></div>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px">
    <div style="margin-bottom:16px">
      <label style="font-weight:600;font-size:14px">Date / Time:</label>
      <input type="datetime-local" id="dt" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:16px;margin-top:4px">
    </div>
    <button class="btn btn-primary" onclick="dateToTs()">→ Convert to Timestamp</button>
    <div style="margin-top:12px;font-size:15px;color:var(--muted)" id="dtResult"></div>
  </div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;font-size:14px;color:var(--muted);text-align:center">
    Current Unix timestamp: <b id="now" style="color:var(--text)"></b>
  </div>
  <div class="ad-unit">AdSense — Below Tool</div>
</div>
<footer><p><a href="/privacy.html">Privacy Policy</a> · <a href="/about.html">About</a></p></footer>
<script>
const ts=document.getElementById('ts'),dt=document.getElementById('dt'),tsR=document.getElementById('tsResult'),dtR=document.getElementById('dtResult'),now=document.getElementById('now');
function tsToDate(){
  const v=parseInt(ts.value);if(!v){tsR.textContent='Please enter a valid timestamp';return;}
  const d=new Date(v*1000);tsR.innerHTML='<b>UTC:</b> '+d.toUTCString()+'<br><b>Local:</b> '+d.toString()+'<br><b>ISO:</b> '+d.toISOString();
}
function dateToTs(){
  const v=dt.value;if(!v){dtR.textContent='Please select a date';return;}
  const d=new Date(v);dtR.innerHTML='<b>Seconds:</b> '+Math.floor(d.getTime()/1000)+'<br><b>Milliseconds:</b> '+d.getTime();
}
setInterval(()=>{now.textContent=Math.floor(Date.now()/1000);},1000);
now.textContent=Math.floor(Date.now()/1000);
</script>
</body>
</html>

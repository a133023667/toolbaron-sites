<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>URL Encoder / Decoder — Free Online | ToolBaron</title><link rel="stylesheet" href="../css/style.css"></head>
<body>
<nav><a href="/" class="logo">Tool<span>Baron</span></a></nav>
<div class="tool-container"><div class="tool-header"><h1>🔗 URL Encoder / Decoder</h1><p>Encode or decode URL strings</p></div>
<div class="ad-unit">AdSense</div>
<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-primary" onclick="c('encode')" style="flex:1">Encode</button><button class="btn btn-primary" onclick="c('decode')" style="flex:1">Decode</button></div>
<div style="display:flex;gap:16px;flex-wrap:wrap"><div style="flex:1;min-width:280px"><div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">INPUT</div><textarea id="in" style="width:100%;height:250px;font-family:monospace;font-size:13px;padding:12px;border:1px solid var(--border);border-radius:8px;resize:vertical"></textarea></div>
<div style="flex:1;min-width:280px"><div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">OUTPUT</div><textarea id="out" readonly style="width:100%;height:250px;font-family:monospace;font-size:13px;padding:12px;border:1px solid var(--border);border-radius:8px;background:#f8fafc;resize:vertical"></textarea>
<button class="btn btn-primary btn-block" onclick="copy()" style="margin-top:8px">📋 Copy</button></div></div></div>
<footer><p>&copy; 2026 ToolBaron</p></footer>
<div class="toast" id="toast"></div>
<script>
function c(m){const i=document.getElementById('in'),o=document.getElementById('out');try{o.value=m==='encode'?encodeURIComponent(i.value):decodeURIComponent(i.value);}catch(e){o.value='Error: '+e.message;}}
function copy(){const v=document.getElementById('out').value;if(v){navigator.clipboard.writeText(v);const t=document.getElementById('toast');t.textContent='Copied!';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}}
</script>
</body>
</html>

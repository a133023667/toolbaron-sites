<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regex Tester — Test Regular Expressions Online | ToolBaron</title>
<meta name="description" content="Free online regex tester. Test regular expressions with live matching, highlighting, and groups. 100% browser-based.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav><a href="/" class="logo">Tool<span>Baron</span></a><div class="nav-links"><a href="https://toolbaron.com">More Tools</a></div></nav>
<div class="tool-container">
  <div class="tool-header"><h1>🔍 Regex Tester</h1><p>Test regular expressions with live matching</p></div>
  <div class="ad-unit">AdSense</div>
  <div style="margin-bottom:12px">
    <label style="font-size:14px;font-weight:500">Pattern:</label>
    <div style="display:flex;gap:8px">
      <input type="text" id="pattern" placeholder="/regex/flags" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:monospace;font-size:14px">
      <button class="btn btn-primary" onclick="test()">Test</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">Flags: g, i, m, s, u</div>
  </div>
  <textarea id="input" placeholder="Paste your text here..." style="width:100%;height:200px;font-family:monospace;font-size:13px;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px"></textarea>
  <div id="result" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:100px;font-family:monospace;font-size:13px;line-height:1.8">
    <span style="color:var(--muted)">Matches will appear here...</span>
  </div>
</div>
<footer><p><a href="privacy.html">Privacy</a> · &copy; 2026 ToolBaron</p></footer>
<script>
function test(){
  const pInput=document.getElementById('pattern'),text=document.getElementById('input').value,result=document.getElementById('result');
  let patternStr=pInput.value,flags='g';
  const m=patternStr.match(/^\/(.+)\/([gimsuv]*)$/);
  if(m){patternStr=m[1];flags=m[2]||'g';}
  try{
    const re=new RegExp(patternStr,flags);
    const matches=text.match(re);
    if(!matches){result.innerHTML='<span style="color:var(--muted)">No matches</span>';return;}
    const highlighted=text.replace(re,m=>`<mark style="background:#fde68a;border-radius:2px">${m}</mark>`);
    result.innerHTML=`<div style="margin-bottom:8px;color:#10b981">✓ ${matches.length} matches</div><div>${highlighted}</div>`;
  }catch(e){result.innerHTML=`<span style="color:#ef4444">Invalid regex: ${e.message}</span>`;}
}
</script>
</body>
</html>

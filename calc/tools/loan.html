<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Loan Calculator — Free Online Calculator | ToolBaron</title>
<meta name="description" content="Free online loan calculator. Estimate your monthly payment from principal, interest rate, and loan term. Instant results, 100% browser-based.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav><a href="https://toolbaron.com" class="logo">Tool<span>Baron</span></a></nav>

<div class="tool-container">
  <div class="tool-header">
    <h1>🏦 Simple Loan Calculator</h1>
    <p>Estimate your monthly payment — quick and easy</p>
  </div>

  <div class="ad-unit">AdSense</div>

  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px">
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">
      <div style="flex:1;min-width:200px">
        <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">Loan Amount ($)</label>
        <input type="number" id="principal" placeholder="e.g. 250000" step="0.01" min="0" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px">
      </div>
      <div style="flex:1;min-width:200px">
        <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="e.g. 5.5" step="0.01" min="0" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px">
      </div>
      <div style="flex:1;min-width:200px">
        <label style="font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px">Loan Term (years)</label>
        <input type="number" id="years" placeholder="e.g. 30" step="1" min="0" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px">
      </div>
    </div>

    <button class="btn btn-primary btn-block" onclick="calcLoan()">Calculate Payment</button>

    <div id="loan-results" style="display:none;margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px">
      <div style="background:#f8fafc;padding:16px;border-radius:8px;text-align:center">
        <div style="font-size:12px;color:var(--muted)">Monthly Payment</div>
        <div id="monthly-payment" style="font-size:22px;font-weight:700;color:var(--primary)">—</div>
      </div>
      <div style="background:#f8fafc;padding:16px;border-radius:8px;text-align:center">
        <div style="font-size:12px;color:var(--muted)">Total Payments</div>
        <div id="total-paid" style="font-size:22px;font-weight:700">—</div>
      </div>
      <div style="background:#f8fafc;padding:16px;border-radius:8px;text-align:center">
        <div style="font-size:12px;color:var(--muted)">Total Interest</div>
        <div id="total-interest" style="font-size:22px;font-weight:700;color:var(--orange)">—</div>
      </div>
    </div>

    <!-- Amortization summary -->
    <div id="amort-summary" style="display:none;margin-top:20px;padding:16px;background:#f8fafc;border-radius:8px;font-size:14px;line-height:1.8">
      <strong>Payment Breakdown</strong>
      <div id="amort-details"></div>
    </div>
  </div>

  <div class="ad-unit">AdSense</div>
</div>

<footer><p><a href="../privacy.html">Privacy</a> · &copy; 2026 ToolBaron</p></footer>

<script>
function calcLoan() {
  const principal = parseFloat(document.getElementById('principal').value);
  const annualRate = parseFloat(document.getElementById('rate').value);
  const years = parseFloat(document.getElementById('years').value);
  const resultsDiv = document.getElementById('loan-results');
  const amortDiv = document.getElementById('amort-summary');

  if (isNaN(principal) || isNaN(annualRate) || isNaN(years) || principal <= 0 || years <= 0) {
    document.getElementById('monthly-payment').textContent = '—';
    document.getElementById('total-paid').textContent = '—';
    document.getElementById('total-interest').textContent = 'Enter values';
    resultsDiv.style.display = 'grid';
    amortDiv.style.display = 'none';
    return;
  }

  const monthlyRate = (annualRate / 100) / 12;
  const numPayments = Math.round(years * 12);

  let monthlyPayment;
  if (monthlyRate === 0) {
    monthlyPayment = principal / numPayments;
  } else {
    monthlyPayment = principal * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
  }

  const totalPaid = monthlyPayment * numPayments;
  const totalInterest = totalPaid - principal;

  document.getElementById('monthly-payment').textContent = '$' + monthlyPayment.toFixed(2);
  document.getElementById('total-paid').textContent = '$' + totalPaid.toFixed(2);
  document.getElementById('total-interest').textContent = '$' + totalInterest.toFixed(2);
  resultsDiv.style.display = 'grid';

  // Amortization summary
  const interestRatio = totalPaid > 0 ? (totalInterest / totalPaid) * 100 : 0;
  document.getElementById('amort-details').innerHTML =
    'Loan amount: <strong>$' + principal.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</strong><br>' +
    'Monthly payment: <strong>$' + monthlyPayment.toFixed(2) + '</strong> for <strong>' + numPayments + '</strong> months<br>' +
    'Interest rate: <strong>' + annualRate + '%</strong> APR<br>' +
    'Interest makes up <strong>' + interestRatio.toFixed(1) + '%</strong> of your total payments';
  amortDiv.style.display = 'block';
}
</script>
</body>
</html>

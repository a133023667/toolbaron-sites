<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview — Free Online Text Tool | ToolBaron</title>
<meta name="description" content="Write Markdown and preview rendered HTML in real-time. Free, no registration.">
<link rel="stylesheet" href="../css/style.css">
<style>#preview{font-size:15px;line-height:1.8}#preview h1{font-size:24px;margin:16px 0 8px}#preview h2{font-size:20px;margin:14px 0 6px}#preview p{margin-bottom:12px}#preview code{background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:13px}#preview pre{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.5}</style>
</head>
<body>
<nav><a href="/" class="logo">Tool<span>Baron</span></a></nav>
<div class="tool-container">
  <div class="tool-header"><h1>📄 Markdown Preview</h1><p>Write Markdown and see the rendered HTML in real-time</p></div>
  <div class="ad-unit">AdSense</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap">
    <div style="flex:1;min-width:280px">
      <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">MARKDOWN</div>
      <textarea id="input" placeholder="# Hello World&#10;&#10;Write your **Markdown** here..." style="width:100%;height:400px;font-family:monospace;font-size:13px;padding:12px;border:1px solid var(--border);border-radius:8px;resize:vertical"></textarea>
    </div>
    <div style="flex:1;min-width:280px">
      <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">PREVIEW</div>
      <div id="preview" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:400px"></div>
    </div>
  </div>
</div>
<footer><p><a href="privacy.html">Privacy</a> · &copy; 2026 ToolBaron</p></footer>
<script type="module">
import {marked} from 'https://cdn.jsdelivr.net/npm/marked@12.0.0/+esm';
const i=document.getElementById('input'),p=document.getElementById('preview');
i.addEventListener('input',()=>{p.innerHTML=marked.parse(i.value||'');});
i.value=`# Welcome to Markdown Preview\n\nWrite your **Markdown** here and see the HTML preview in real-time.\n\n## Features\n\n- **Bold** and *italic*\n- Lists and [links](https://example.com)\n- \`inline code\`\n\n\`\`\`javascript\nconsole.log("Code blocks too!");\n\`\`\`\n\n> Blockquotes for emphasis.\n\nStart typing to see the magic ✨`;
p.innerHTML=marked.parse(i.value);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Sorter — Free Online Text Tool | ToolBaron</title>
<meta name="description" content="Sort lines alphabetically, remove duplicates, or reverse order. Free online line sorter tool.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav><a href="/" class="logo">Tool<span>Baron</span></a></nav>
<div class="tool-container">
  <div class="tool-header"><h1>Line Sorter</h1><p>Sort lines alphabetically, remove duplicates, or reverse the order</p></div>
  <div class="ad-unit">AdSense</div>
  <textarea id="input" placeholder="Paste your text here, one entry per line...&#10;apple&#10;banana&#10;cherry&#10;apple&#10;date" style="width:100%;height:250px;font-family:monospace;font-size:14px;padding:16px;border:1px solid var(--border);border-radius:8px;resize:vertical"></textarea>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
    <button class="btn btn-primary" onclick="sortLines('asc')">Sort A-Z</button>
    <button class="btn btn-primary" onclick="sortLines('desc')">Sort Z-A</button>
    <button class="btn btn-primary" onclick="sortLines('asc-dedup')">Sort &amp; Remove Duplicates</button>
    <button class="btn btn-primary" onclick="sortLines('reverse')">Reverse Order</button>
    <button class="btn" onclick="document.getElementById('input').value='';document.getElementById('outputArea').style.display='none'">Clear</button>
  </div>
  <div id="outputArea" style="display:none;margin-top:20px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:13px;font-weight:600;color:var(--muted)">RESULT</div>
      <button class="btn btn-green" onclick="copyOutput()" id="copyBtn">Copy Result</button>
    </div>
    <textarea id="output" readonly style="width:100%;height:250px;font-family:monospace;font-size:14px;padding:16px;border:1px solid var(--border);border-radius:8px;resize:vertical;background:var(--card)"></textarea>
    <div style="font-size:13px;color:var(--muted);margin-top:8px" id="stats"></div>
  </div>
</div>
<footer><p><a href="privacy.html">Privacy</a> &middot; &copy; 2026 ToolBaron</p></footer>
<script>
function sortLines(mode) {
  const text = document.getElementById('input').value;
  if (!text.trim()) return;
  let lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
  const originalCount = lines.length;
  let result;
  switch (mode) {
    case 'asc':
      result = [...lines].sort((a, b) => a.localeCompare(b, 'en', {sensitivity: 'base'}));
      break;
    case 'desc':
      result = [...lines].sort((a, b) => b.localeCompare(a, 'en', {sensitivity: 'base'}));
      break;
    case 'asc-dedup':
      result = [...new Set(lines)].sort((a, b) => a.localeCompare(b, 'en', {sensitivity: 'base'}));
      break;
    case 'reverse':
      result = [...lines].reverse();
      break;
  }
  document.getElementById('output').value = result.join('\n');
  document.getElementById('outputArea').style.display = 'block';
  document.getElementById('stats').textContent = result.length + ' lines' + (mode === 'asc-dedup' && originalCount !== result.length ? ' (' + (originalCount - result.length) + ' duplicates removed)' : '');
  window._sortedResult = result.join('\n');
}
function copyOutput() {
  navigator.clipboard.writeText(window._sortedResult).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Result', 1500);
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Free Online Text Tool | ToolBaron</title>
<meta name="description" content="Convert text between lowercase, UPPERCASE, Title Case, and Sentence case. Free online tool, no registration required.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav><a href="/" class="logo">Tool<span>Baron</span></a></nav>
<div class="tool-container">
  <div class="tool-header"><h1>Case Converter</h1><p>Convert text between lowercase, UPPERCASE, Title Case, and Sentence case</p></div>
  <div class="ad-unit">AdSense</div>
  <textarea id="input" placeholder="Paste your text here..." style="width:100%;height:200px;font-family:inherit;font-size:16px;padding:16px;border:1px solid var(--border);border-radius:8px;resize:vertical"></textarea>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px">
    <button class="btn btn-primary" onclick="convert('lower')">lowercase</button>
    <button class="btn btn-primary" onclick="convert('upper')">UPPERCASE</button>
    <button class="btn btn-primary" onclick="convert('title')">Title Case</button>
    <button class="btn btn-primary" onclick="convert('sentence')">Sentence case</button>
    <button class="btn" onclick="copyOutput()" id="copyBtn" style="display:none">Copy Result</button>
  </div>
  <div id="outputArea" style="display:none;margin-top:20px">
    <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:8px">RESULT</div>
    <div id="output" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:60px;white-space:pre-wrap;word-break:break-word;font-size:16px"></div>
  </div>
</div>
<footer><p><a href="privacy.html">Privacy</a> &middot; &copy; 2026 ToolBaron</p></footer>
<script>
function convert(type) {
  const text = document.getElementById('input').value;
  if (!text.trim()) return;
  let result = '';
  switch (type) {
    case 'lower': result = text.toLowerCase(); break;
    case 'upper': result = text.toUpperCase(); break;
    case 'title':
      result = text.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
      break;
    case 'sentence':
      result = text.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase());
      break;
  }
  document.getElementById('output').textContent = result;
  document.getElementById('outputArea').style.display = 'block';
  document.getElementById('copyBtn').style.display = 'inline-block';
  window._lastResult = result;
}
function copyOutput() {
  navigator.clipboard.writeText(window._lastResult).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Result', 1500);
  });
}
</script>
</body>
</html>

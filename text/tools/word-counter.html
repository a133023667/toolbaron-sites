<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter — Free Online Text Tool | ToolBaron</title>
<meta name="description" content="Free online word counter. Count words, characters, sentences, and estimate reading time.">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<nav><a href="/" class="logo">Tool<span>Baron</span></a></nav>
<div class="tool-container">
  <div class="tool-header"><h1>📝 Word Counter</h1><p>Count words, characters, sentences, and reading time</p></div>
  <div class="ad-unit">AdSense</div>
  <textarea id="input" placeholder="Paste your text here..." style="width:100%;height:300px;font-family:inherit;font-size:16px;padding:16px;border:1px solid var(--border);border-radius:8px;resize:vertical"></textarea>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:16px">
    <div class="tool-card" style="text-align:center"><div style="font-size:28px;font-weight:700" id="words">0</div><div style="font-size:13px;color:var(--muted)">Words</div></div>
    <div class="tool-card" style="text-align:center"><div style="font-size:28px;font-weight:700" id="chars">0</div><div style="font-size:13px;color:var(--muted)">Characters</div></div>
    <div class="tool-card" style="text-align:center"><div style="font-size:28px;font-weight:700" id="sentences">0</div><div style="font-size:13px;color:var(--muted)">Sentences</div></div>
    <div class="tool-card" style="text-align:center"><div style="font-size:28px;font-weight:700" id="time">0s</div><div style="font-size:13px;color:var(--muted)">Read Time</div></div>
  </div>
</div>
<footer><p><a href="privacy.html">Privacy</a> · &copy; 2026 ToolBaron</p></footer>
<script>
const i=document.getElementById('input');
i.addEventListener('input',()=>{
  const t=i.value.trim();
  document.getElementById('chars').textContent=t.length;
  document.getElementById('words').textContent=t?t.split(/\s+/).length:0;
  document.getElementById('sentences').textContent=t?t.split(/[.!?]+/).filter(Boolean).length:0;
  const w=t?t.split(/\s+/).length:0;
  document.getElementById('time').textContent=Math.max(1,Math.ceil(w/200))+'s';
});
</script>
</body>
</html>
